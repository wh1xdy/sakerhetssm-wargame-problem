<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Note Search</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        font-family: "Palatino Linotype", "Book Antiqua", Palatino, serif;
        margin: 0;
        padding: 48px 24px;
        background: linear-gradient(130deg, #f8f0e5, #eff5ff);
        color: #1c1c1c;
      }
      main {
        max-width: 980px;
        margin: 0 auto;
        padding: 36px 32px 40px;
        background: #ffffff;
        border: 1px solid #e6e2d8;
        box-shadow: 0 16px 30px rgba(20, 20, 20, 0.08);
      }
      h1 {
        font-size: 40px;
        margin: 0 0 8px;
      }
      p {
        font-size: 18px;
        margin: 0;
        color: #3a3a3a;
      }
      .search-form {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
        margin: 18px 0 0;
      }
      .search-form label {
        font-weight: 600;
        font-size: 16px;
      }
      .search-form input[type="search"] {
        flex: 1 1 260px;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid #d6d6d6;
        font-size: 16px;
        background: #fbfaf6;
        box-sizing: border-box;
      }
      .search-form button {
        padding: 10px 18px;
        border-radius: 999px;
        border: none;
        background: #1b3d8f;
        color: #ffffff;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
      }
      .search-form button:hover {
        background: #16306e;
      }
      .status {
        margin-top: 18px;
        padding: 12px 16px;
        background: #fdf8ef;
        border: 1px solid #e5dcc6;
        border-radius: 12px;
        color: #3b2b12;
      }
      .grid {
        margin: 32px 0 0;
        display: grid;
        gap: 22px;
        grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      }
      .tile {
        background: #ffffff;
        border: 1px solid #e7e1d2;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 18px 26px rgba(20, 20, 20, 0.08);
        display: grid;
        grid-template-rows: auto 1fr;
      }
      .tile h2 {
        font-size: 14px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        margin: 0;
        padding: 14px 16px;
        background: #f9f4ea;
        color: #6e5c3b;
        border-bottom: 1px solid #efe7d7;
      }
      iframe {
        width: 100%;
        border: 0;
        height: 260px;
        background: #ffffff;
      }
      .empty {
        text-align: center;
        padding: 24px;
        background: #fffaf0;
        border: 1px dashed #d8d2c5;
        border-radius: 12px;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Search</h1>
        <form class="search-form" action="/search" method="get">
          <input
            id="q"
            name="q"
            type="search"
            minlength="3"
            placeholder="Start typing..."
            required
          />
          <button type="submit">Search</button>
        </form>
        <div class="status" id="status"></div>
      </header>
      <section class="grid" id="results"></section>
    </main>
    <script src="/search.js" defer></script>
  </body>
</html>
