<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>If it quacks like a DB</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 800px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header .subtitle {
            color: #666;
            font-size: 1.1em;
        }

        .duck-emoji {
            font-size: 3em;
            margin-bottom: 10px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        #searchInput {
            flex: 1;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        #searchInput:focus {
            outline: none;
            border-color: #667eea;
        }

        #searchButton {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        #searchButton:hover {
            transform: translateY(-2px);
        }

        #searchButton:active {
            transform: translateY(0);
        }

        .results {
            margin-top: 30px;
        }

        .product-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
            transition: transform 0.2s;
        }

        .product-card:hover {
            transform: translateX(5px);
        }

        .product-name {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .product-category {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.85em;
            margin-bottom: 10px;
        }

        .product-price {
            font-size: 1.2em;
            color: #28a745;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .product-description {
            color: #666;
            line-height: 1.5;
        }

        .error {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 10px;
            padding: 15px;
            color: #856404;
            margin-top: 20px;
        }

        .no-results {
            text-align: center;
            color: #666;
            padding: 40px;
            font-size: 1.1em;
        }

        .powered-by {
            text-align: center;
            margin-top: 30px;
            color: #999;
            font-size: 0.9em;
        }

        .powered-by strong {
            color: #667eea;
        }

        .hint {
            background: #e7f3ff;
            border-left: 4px solid #2196F3;
            padding: 15px;
            margin-top: 20px;
            border-radius: 5px;
            font-size: 0.9em;
            color: #0c5460;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="duck-emoji">🦆</div>
            <h1>Duck Store</h1>
            <p class="subtitle">Find all your favorite duck-themed products</p>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search for products... (e.g., duck, books, toys)" />
            <button id="searchButton">Search</button>
        </div>

        <div class="hint">
            <strong>Note:</strong> Our admin section contains sensitive data and is protected.
            Only authorized personnel can access it. The public catalog is available for browsing!
        </div>

        <div id="results" class="results"></div>

        <div class="powered-by">
            Powered by <strong>SQL Database</strong> - Fast and reliable
        </div>
    </div>

    <script>
        const searchInput = document.getElementById('searchInput');
        const searchButton = document.getElementById('searchButton');
        const resultsDiv = document.getElementById('results');

        async function performSearch() {
            const query = searchInput.value.trim();

            if (!query) {
                resultsDiv.innerHTML = '<div class="no-results">Please enter a search term</div>';
                return;
            }

            searchButton.disabled = true;
            searchButton.textContent = 'Searching...';

            try {
                const response = await fetch('/search', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ query: query })
                });

                const data = await response.json();

                if (data.error) {
                    resultsDiv.innerHTML = `<div class="error">Error: ${escapeHtml(data.error)}</div>`;
                } else if (data.products && data.products.length > 0) {
                    let html = '';
                    data.products.forEach(product => {
                        html += `
                            <div class="product-card">
                                <div class="product-name">${escapeHtml(product.name)}</div>
                                <span class="product-category">${escapeHtml(product.category)}</span>
                                <div class="product-price">$${product.price}</div>
                                <div class="product-description">${escapeHtml(product.description)}</div>
                            </div>
                        `;
                    });
                    resultsDiv.innerHTML = html;
                } else {
                    resultsDiv.innerHTML = '<div class="no-results">No products found. Try a different search term!</div>';
                }
            } catch (error) {
                resultsDiv.innerHTML = `<div class="error">Network error: ${escapeHtml(error.message)}</div>`;
            } finally {
                searchButton.disabled = false;
                searchButton.textContent = 'Search';
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        searchButton.addEventListener('click', performSearch);
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                performSearch();
            }
        });

        // Load initial products
        window.addEventListener('load', () => {
            searchInput.value = 'duck';
            performSearch();
        });
    </script>
</body>
</html>
