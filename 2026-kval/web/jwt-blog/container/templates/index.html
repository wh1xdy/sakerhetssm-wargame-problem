<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog</title>
    <style>
        body {
            display: grid;
            grid-template-columns: 1fr;
            background-color: #bbb;
            gap: 0.5em;
            font-family: Arial, Helvetica, sans-serif;
            padding-top: 0.5em;
        }

        body > * {
            width: 90%;
            max-width: 700px;
            margin: auto;
            background-color: white;
            box-sizing: border-box;
            padding: 1em;
            border-radius: 0.5em;
            box-shadow: 0.1em 0.1em 1em #0006;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 {
            margin: 0;
            width: max-content;
        }
        header nav {
            display: flex;
            flex-direction: row;
            gap: 1em;
        }
        header nav a {
            color: inherit;
        }

        main {
            display: flex;
            flex-direction: column-reverse;
            gap: 1em;
        }
        main :is(h3, p) {
            margin: 0;
        }
        main a {
            background-color: #ddd;
            color: black;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            gap: 0.2em;
            padding: 0.75em;
            border-radius: 0.5em;
        }

        footer {
            text-align: center;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <header>
        <h1>
            Blog
        </h1>
    </header>
    <main>{% for post in posts %}
        <article>
            <a href="/post?id={{ loop.index0 }}">
                <h3>{{ post.title }}</h3>
                <p>{{ post.summary }}</p>
            </a>
        </article>{% endfor %}
    </main>
    <footer>
        Copyright &copy; {{ year }}
    </footer>
</body>
</html>
