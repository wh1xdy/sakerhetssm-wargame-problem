<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ post.title }} - Blog</title>
    <style>
        body {
            display: grid;
            grid-template-columns: 1fr;
            background-color: #bbb;
            gap: 0.5em;
            font-family: Arial, Helvetica, sans-serif;
            padding-top: 0.5em;
        }

        body > * {
            width: 90%;
            max-width: 700px;
            margin: auto;
            background-color: white;
            box-sizing: border-box;
            padding: 1em;
            border-radius: 0.5em;
            box-shadow: 0.1em 0.1em 1em #0006;
        }

        header h1,
        main h2 {
            margin: 0;
        }
        header h1 a {
            color: inherit;
            text-decoration: none;
        }

        main {
            display: flex;
            flex-direction: column;
            gap: 1em;
        }

        main p {
            margin: 0;
        }
        main p:first-of-type {
            font-weight: bold;
            margin-bottom: 1em;
        }
        main p:last-of-type {
            margin-top: 1em;
        }

        footer {
            text-align: center;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <header>
        <h1>
            <a href="/">Blog</a>
        </h1>
    </header>
    <main>
        <h2>{{ post.title }}</h2>
        <p>{{ post.summary }}</p>
        {{ post.content | safe }}
        <p>Written by: {{ post.author }}</p>
    </main>
    <footer>
        Copyright &copy; {{ year }}
    </footer>
</body>
</html>
