    <script>
      let n = 15;
      const set = (i, a, b, c, d) => {
        document.documentElement.style.setProperty(`--m${i}00`, a);
        document.documentElement.style.setProperty(`--m${i}01`, b);
        document.documentElement.style.setProperty(`--m${i}10`, c);
        document.documentElement.style.setProperty(`--m${i}11`, d);
      };

      for (let i = 0; i < n; i++) set(i, 1, 0, 0, 1);

      const update = () => {
        let flag = document.getElementById("flag").value;
        for (let i = 0; i < n; i++) {
          let chunk = flag.slice(i * 4, i * 4 + 4);
          if (chunk.length !== 4) {
            set(i, 1, 0, 0, 1);
            continue;
          }
          let a = chunk.charCodeAt(0);
          let b = chunk.charCodeAt(1);
          let c = chunk.charCodeAt(2);
          let d = chunk.charCodeAt(3);
          set(i, a, b, c, d);
        }
      };
    </script>
