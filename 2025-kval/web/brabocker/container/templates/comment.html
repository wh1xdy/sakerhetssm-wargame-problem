<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>Kommentera - Bra Böcker</title>
    <style>
      .comments {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        margin-top: 1rem;
        margin-bottom: 1rem;
      }

      .card {
        width: 55ch;
        border-radius: 1rem;
        border: 1px solid gray;
        padding: 0.5rem;
        box-shadow: rgba(100, 100, 111, 0.2) 0px 7px 29px 0px;
        text-decoration: none;
      }

      p {
        margin: 0;
      }

      h2 {
        color: gray;
        font-weight: normal;
        font-style: italic;
      }

      strong {
        margin-bottom: 0.5rem;
        display: block;
      }

      h4 {
        margin: 0;
        margin-bottom: 0.5rem;
      }
    </style>
  </head>

  <body>
    <a href="/"><- Hem</a>
    <form action="/comment" method="post">
      <input type="hidden" name="review_id" value="{{.ID}}" />
      <textarea
        required
        name="comment"
        rows="4"
        cols="80"
        placeholder="Jag håller verkligen med..."
      ></textarea>
      <div>
        <input type="submit" value="Kommentera" />
      </div>
    </form>
    <hr />
    <h1>{{.ReviewTitle}}</h1>
    <h2>{{.BookTitle}}</h2>
    <strong>Betyg: {{.Rating}} / 10</strong>
    <p>Av: {{.Username}}</p>
    <br />
    <p>{{.Review}}</p>
  </body>
</html>
