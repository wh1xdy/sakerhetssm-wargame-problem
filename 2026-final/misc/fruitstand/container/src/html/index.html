    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit Stand</title>
    <style>
        body {
            margin: 0;
            background-color: wheat;
        }

        #dialog-scan[open] {
            background: none;
            border: none;
            width: 60vw;
            padding: 0;

            max-width: min(800px, 60vh);

            display: grid;
            gap: 10px;
        }
        #dialog-scan::backdrop {
            background-color: #0007;
        }

        #dialog-scan section {
            background-color: wheat;
            border-radius: 10px;
            padding: 10px;
        }

        #dialog-scan label {
            line-height: 2em;
        }

        #dialog-scan details div {
            display: flex;
            flex-direction: column;
        }
        #dialog-scan details textarea {
            height: 5em;
        }
        #dialog-scan details div {
            display: flex;
            flex-direction: column;
        }
        #dialog-scan canvas {
            --width: 445px;
            --height: 412px;
            width: var(--width);
            height: var(--height);
            border-radius: calc(var(--width) / 800 * 20);
            object-fit: cover;
            position: absolute;
        }

        #printer path {
            fill: #ffffff;
            stroke: #000000;
            stroke-width: 8;
            paint-order: markers fill stroke;
        }

        body > svg {
            display: block;
            margin: 20px auto;
            width: min(25%, 25vh);
        }

        main {
            display: flex;
            justify-content: space-between;
            padding: 0 10%;
        }
        main > * {
            width: min(40%, 30vh);
            filter: drop-shadow(-5px 9px 10px rgba(0, 0, 0, 0.4))
                drop-shadow(0 10px 20px rgba(0, 0, 0, 0.2));
            transition: transform 0.2s;
        }
        main > :last-child {
            filter: drop-shadow(5px 9px 10px rgba(0, 0, 0, 0.4))
                drop-shadow(0 10px 20px rgba(0, 0, 0, 0.2));
        }
        main > :first-child:hover {
            cursor: pointer;
            transform: translate(10px, -10px) scale(1.05);
        }

        .receipt-paper {
            --time-between-rows: 0.1s;
            --height-transition-time: var(var(--time-between-rows));
            transition: transform 0.7s, height var(--height-transition-time) linear;
            --paper-width: max-content;
            width: var(--paper-width);
            overflow: hidden;
            outline: 1px solid black;
            background-color: white;
        }
        #printing-paper {
            top: -10px;
            height: 0px;
            position: absolute;
            transform: rotate(180deg);
        }
        .receipt-paper div {
            background-color: white;
            font-size: 10px;
            width: max-content;
            margin: auto;
            padding: 1em;
            padding-bottom: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
            white-space: pre;
        }
        .receipt-paper:not(#printing-paper) div {
            margin: 0;
        }
        .receipt-paper div hr {
            margin: 0 -1em;
            border: solid black 0.2em;
        }

        .receipt-paper img {
            width: calc(var(--paper-width) - 1em * 2);
        }

        #example-qrs {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15%;
            padding: 0 15%;
            margin-top: 5%;
        }
        #example-qrs svg {
            width: 100%;
            background-color: white;
            border-radius: 5px;
            align-self: center;
            --transform: rotate(calc(-5deg + 10deg * (var(--index) - 2)));
            transform: var(--transform);
            filter: drop-shadow(-5px 5px 7px rgba(0, 0, 0, 0.4))
                drop-shadow(0 10px 20px rgba(0, 0, 0, 0.2));
            transition: transform 0.2s;
        }
        #example-qrs svg:nth-child(n+3) {
            filter: drop-shadow(5px 5px 7px rgba(0, 0, 0, 0.4))
                drop-shadow(0 10px 20px rgba(0, 0, 0, 0.2));
        }
        #example-qrs svg:nth-child(1) { --index: 1; }
        #example-qrs svg:nth-child(2) { --index: 2; }
        #example-qrs svg:nth-child(3) { --index: 3; }
        #example-qrs svg:nth-child(4) { --index: 4; }

        #example-qrs svg:hover {
            cursor: pointer;
            transform: var(--transform) translate(calc(5px * (var(--index) - 2)), -10px) scale(1.05);
        }

        #history {
            display: flex;
            flex-wrap: wrap;
            margin-top: 100px;
            gap: 10px;
        }
        #history > * {
            height: max-content;
        }

        @media (min-width: 1200px) {

        }
    </style>

    <script>

        /*

        This file is not part of the chall.
        It is just here to emulate the
        hardware part of the chall.

        */

        const scanner = document.querySelector('#scanner');

        const receiptPrinter = document.querySelector('#printer');
        const receiptPrintSlot = receiptPrinter.querySelector('rect');

        const printingPaper = document.querySelector('#printing-paper');
        const printingText = printingPaper.querySelector('div');

        const printHistory = document.querySelector('#history');

        const addDialog = document.querySelector('dialog');

        const video = document.createElement('video');
        const addDialogScannerElement = addDialog.querySelector('#qr-camera-scanner');
        const addDialogCanvasElement = addDialog.querySelector('#qr-camera');
        const addDialogCanvas = addDialogCanvasElement.getContext('2d');

        const printerQueue = [];
        let printerTask;

        let qrScannerRunning = false;

        function drawLine(begin, end, color) {
            addDialogCanvas.beginPath();
            addDialogCanvas.moveTo(begin.x, begin.y);
            addDialogCanvas.lineTo(end.x, end.y);
            addDialogCanvas.lineWidth = 4;
            addDialogCanvas.strokeStyle = color;
            addDialogCanvas.stroke();
        }

        function tick() {
            if(!qrScannerRunning) return;

            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                addDialogCanvasElement.hidden = false;

                addDialogCanvasElement.height = video.videoHeight;
                addDialogCanvasElement.width = video.videoWidth;
                addDialogCanvas.drawImage(video, 0, 0, addDialogCanvasElement.width, addDialogCanvasElement.height);
                const imageData = addDialogCanvas.getImageData(0, 0, addDialogCanvasElement.width, addDialogCanvasElement.height);
                const code = jsQR(imageData.data, imageData.width, imageData.height, {
                    inversionAttempts: "dontInvert",
                });
                if (code) {
                    drawLine(code.location.topLeftCorner, code.location.topRightCorner, "#FF3B58");
                    drawLine(code.location.topRightCorner, code.location.bottomRightCorner, "#FF3B58");
                    drawLine(code.location.bottomRightCorner, code.location.bottomLeftCorner, "#FF3B58");
                    drawLine(code.location.bottomLeftCorner, code.location.topLeftCorner, "#FF3B58");

                    makeReq(code.data);
                    closeAddDialog();
                }
            }
            requestAnimationFrame(tick);
        }

        function openAddDialog() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(function(stream) {
                video.srcObject = stream;
                video.setAttribute("playsinline", true); // required to tell iOS safari we don't want fullscreen
                video.play();
                requestAnimationFrame(tick);
            });

            qrScannerRunning = true;
            addDialog.showModal();

            const scannerRect = addDialogScannerElement.getBoundingClientRect();

            const scaleFactor = scannerRect.width / 1000;

            addDialogCanvasElement.style.setProperty('--width', `${800 * scaleFactor}px`);
            addDialogCanvasElement.style.setProperty('--height', `${750 * scaleFactor}px`);
            addDialogCanvasElement.style.top = `${150 * scaleFactor}px`;
            addDialogCanvasElement.style.left = `${100 * scaleFactor}px`;
        }

        function closeAddDialog() {
            qrScannerRunning = false;
            addDialog.close();
        }

        addDialog.addEventListener('close', event => {
            closeAddDialog();
        });

        scanner.addEventListener('click', event => {
            if(addDialog.open) {
                closeAddDialog();
            } else {
                openAddDialog();
            }
        });

        addDialog.addEventListener('click', event => {
            const dialogRect = addDialog.getBoundingClientRect();
            const clickedX = event.clientX;
            const clickedY = event.clientY;
            const inside =
                dialogRect.left <= clickedX && clickedX <= dialogRect.right &&
                dialogRect.top  <= clickedY && clickedY <= dialogRect.bottom;

            if(!inside) {
                closeAddDialog();
            }
        });

        function updateReceiptPosition() {
            const slotRect = receiptPrintSlot.getBoundingClientRect();

            const offset = slotRect.width * 0.1;
            const padding = 10;
            const targetWidth = slotRect.width - offset * 2;
            printingPaper.style.setProperty('--paper-width', `${targetWidth}px`);
            printingPaper.style.left = `${slotRect.x + offset}px`;
            printingPaper.style.top = `${window.pageYOffset + slotRect.top + (slotRect.height / 2)}px`;

            const textRect = printingText.getBoundingClientRect();

            const scaleFactor = targetWidth / textRect.width;

            const currentFontSize = Number(window.getComputedStyle(printingText).fontSize.replace('px', ''));

            printingText.style.fontSize = `${currentFontSize * scaleFactor}px`;
        }

        /*

        This file is not part of the chall.
        It is just here to emulate the
        hardware part of the chall.

        */

        function printOne() {
            if(printerQueue.length === 0) {
                printerTask = undefined;
                return;
            }

            const newHtml = printerQueue.shift();

            if(printingText.querySelector('hr:last-of-type')) {
                cutAway();
            }

            if(newHtml === '') {
                printOne();
                return;
            }

            const timeBetweenRowsCSS = window
                .getComputedStyle(printingPaper)
                .getPropertyValue('--time-between-rows');
            const timeBetweenRows = timeBetweenRowsCSS.replace('m','').replace('s','') * (timeBetweenRowsCSS.endsWith('ms') ? 1 : 1000);

            const oldSize = printingText.getBoundingClientRect();

            printingText.innerHTML += newHtml;
            updateReceiptPosition();

            const newSize = printingText.getBoundingClientRect();
            const newHeight = newSize.height;
            const newWidth = newSize.width;

            const charsWide = 47;

            const letterAspectRatio = 3 / 2;

            const oneLineHeight = newWidth / charsWide * letterAspectRatio;

            const heightDiff = newHeight - oldSize.height;

            const timeToNext = timeBetweenRows * (heightDiff / oneLineHeight);

            printingPaper.style.setProperty('--height-transition-time', `${timeToNext}ms`);

            printingPaper.style.height = `${newHeight}px`;

            printerTask = setTimeout(printOne, timeToNext);
        }

        function printHtml(newHtml) {
            const receipts = newHtml.split('<hr>');
            receipts.forEach((htmlLine, index) => {
                printerQueue.push(htmlLine + (index < receipts.length - 1 ? '<hr>' : ''));
            });

            if(receipts.length >= 1) {
                closeAddDialog();
            }

            if(printerTask === undefined) {
                printOne();
            }
        }

        function cutAway() {
            const originalRect = printingPaper.getBoundingClientRect();
            printingText.querySelector('hr:last-of-type').remove();
            const currentHtml = printingText.innerHTML;
            printingText.innerHTML = '';
            printingPaper.style.setProperty('--height-transition-time', `0s`);
            printingPaper.style.height = '0';

            const historyEntryItem = document.createElement('li');
            historyEntryItem.classList.add('receipt-paper');
            const historyEntryContent = document.createElement('div');
            historyEntryContent.innerHTML = currentHtml;
            historyEntryItem.style.setProperty('--paper-width', `302px`);
            historyEntryItem.replaceChildren(historyEntryContent);
            printHistory.appendChild(historyEntryItem);

            const newRect = historyEntryItem.getBoundingClientRect();

            const scaleFactor = originalRect.width / newRect.width;
            const xOffset = originalRect.x - newRect.x;
            const yOffset = originalRect.y - newRect.y;
            const str = `translate(calc(${xOffset}px - (${newRect.width}px * ${scaleFactor})), calc(${yOffset}px - (${newRect.height}px * ${scaleFactor}))) scale(${scaleFactor}) rotate(180deg)`;
            historyEntryItem.style.transform = str;
            setTimeout(() => {
                historyEntryItem.style.transition = 'transform 1s';
                historyEntryItem.style.transform = '';
            }, 10);
        }

        async function makeReq(data) {
            const response = await fetch('/scan', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: (typeof data === 'string') ? data : JSON.stringify(data)
            });
            const responseData = await response.text();

            const jsonData = JSON.parse(responseData);

            if(jsonData.hasOwnProperty('data')) {
                printHtml(jsonData.data);
            }
        }

        async function select_product(product) {
            await makeReq({
                'type': 'select_product',
                'product': product
            });
        }

        async function complete_order() {
            await makeReq({
                'type': 'complete_order'
            });
        }
