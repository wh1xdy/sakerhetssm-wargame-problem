title: Grandmas Escape
description: Upon arriving at the retirement home, Grandma was no longer there. Two agents from Skatteverket (the Swedish Tax Agency) met us at the door and explained to us that Grandma is wanted for tax fraud. After a Palt™ dinner with the agents, we were invited to help them with the case. We got access to the following logs obtained from Grandma's telecom provider. They also mentioned something about -30 - 20 * log10(d) (meters). Could you help us figure out where grandma is. **SSM{Cityname_LAT_LONG} (coordinates truncated to two decimals is enough) use . and not , in the flag**.
