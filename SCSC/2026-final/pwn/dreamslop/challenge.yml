title: DreamSlop
description: |
  DreamSlop is a subset extension of DreamBerd [https://github.com/TodePond/GulfOfMexico](the perfect programming language).
  We envision a future where all your slop needs to be handled in an efficient manner.
  This is why we introduced the DreamSlop Heap Memory Model, it's guaranteed to perform!

