<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Join API</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        main {
            padding: 40px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            margin-bottom: 10px;
            color: #333;
            font-size: 1.1em;
        }

        textarea {
            width: 100%;
            min-height: 200px;
            padding: 15px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            resize: vertical;
            transition: border-color 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: #4facfe;
        }

        .button-container {
            text-align: center;
            margin-bottom: 30px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1em;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        button:active {
            transform: translateY(0);
        }

        .result-container {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            display: none;
        }

        .result-container.show {
            display: block;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .result-title {
            font-weight: 600;
            color: #333;
            font-size: 1.2em;
        }

        .copy-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9em;
        }

        .copy-btn:hover {
            background: #218838;
        }

        .result-content {
            background: white;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #f5c6cb;
        }

        .success {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #c3e6cb;
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            main {
                padding: 20px;
            }

            header h1 {
                font-size: 2em;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>JAAS - The best joiner</h1>
            <p>Merge two JSON objects into one!</p>
        </header>

        <main>
            <div id="message"></div>

            <form id="joinForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="obj1">First JSON Object:</label>
                        <textarea id="obj1" name="obj1" placeholder='{"name": "John", "age": 30}' required></textarea>
                    </div>

                    <div class="form-group">
                        <label for="obj2">Second JSON Object:</label>
                        <textarea id="obj2" name="obj2" placeholder='{"city": "New York", "country": "USA"}'
                            required></textarea>
                    </div>
                </div>

                <div class="button-container">
                    <button type="submit">Join Objects</button>
                </div>
            </form>

            <div id="resultContainer" class="result-container">
                <div class="result-header">
                    <span class="result-title">Joined Result:</span>
                    <button class="copy-btn" onclick="copyResult()">Copy</button>
                </div>
                <div id="resultContent" class="result-content"></div>
            </div>
        </main>
    </div>

    <script>
        document.getElementById('joinForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const obj1Input = document.getElementById('obj1').value.trim();
            const obj2Input = document.getElementById('obj2').value.trim();
            const messageDiv = document.getElementById('message');
            const resultContainer = document.getElementById('resultContainer');
            const resultContent = document.getElementById('resultContent');

            // Clear previous messages
            messageDiv.innerHTML = '';
            resultContainer.classList.remove('show');

            try {
                // Validate JSON input
                const obj1 = JSON.parse(obj1Input);
                const obj2 = JSON.parse(obj2Input);

                const response = await fetch('/join', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ obj1, obj2 })
                });

                const data = await response.json();

                if (response.ok) {
                    messageDiv.innerHTML = '<div class="success">Objects joined successfully!</div>';
                    resultContent.textContent = JSON.stringify(data.result, null, 2);
                    resultContainer.classList.add('show');
                } else {
                    messageDiv.innerHTML = `<div class="error">Error: ${data.error}</div>`;
                }
            } catch (error) {
                if (error instanceof SyntaxError) {
                    messageDiv.innerHTML = '<div class="error">Invalid JSON format. Please check your input.</div>';
                } else {
                    messageDiv.innerHTML = `<div class="error">Error: ${error.message}</div>`;
                }
            }
        });

        function copyResult() {
            const resultContent = document.getElementById('resultContent').textContent;
            navigator.clipboard.writeText(resultContent).then(() => {
                const copyBtn = document.querySelector('.copy-btn');
                const originalText = copyBtn.textContent;
                copyBtn.textContent = 'Copied!';
                setTimeout(() => {
                    copyBtn.textContent = originalText;
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy:', err);
            });
        }

        // Add sample data on load
        window.addEventListener('DOMContentLoaded', function () {
            document.getElementById('obj1').value = '{"name": "John", "age": 30}';
            document.getElementById('obj2').value = '{"city": "New York", "country": "USA"}';
        });
    </script>
</body>

</html>
